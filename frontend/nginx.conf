server {
    listen 80;
    server_name localhost;

    # Frontend — React SPA
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — tüm bilinmeyen path'ler index.html'e yönlendirilir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth Service proxy
    location /api/auth {
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users {
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI Services proxy
    location /ai/face/ {
        proxy_pass http://face-detection:8091/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/eye/ {
        proxy_pass http://eye-tracking:8092/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/audio/ {
        proxy_pass http://audio-analysis:8093/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/risk/ {
        proxy_pass http://risk-scoring:8094/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Exam Service proxy (backend gelince aktif olacak)
    # location /api/exams {
    #     proxy_pass http://exam-service:3002;
    #     proxy_set_header Host $host;
    # }
    # location /api/sessions {
    #     proxy_pass http://exam-service:3002;
    #     proxy_set_header Host $host;
    # }

    # Health check
    location /health {
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
    }
}
